service:
  mariadb:
    image: mariadb
    container_name: mariadb
    build:
      context: requirements/mariadb/
    env_file: .env
    secrets: 
      - db-password
      - db-root-passoword
    volumes: 
      - db-data:/var/lib/mysql
    restart: always

  wordpress:
    image: wordpress
    container_name: wordpress
    build:
      context: requirements/wordpress/
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/html