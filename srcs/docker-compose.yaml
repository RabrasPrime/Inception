services:
    mariadb:
        container_name: mariadb
        image: mariadb
        build:
            context: requirements/mariadb/
        env_file: .env
        secrets:
            - db-password
            - db-root-password
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - inception
        restart: always

    wordpress:
        container_name: wordpress
        image: wordpress
        build:
            context: requirements/wordpress/
        depends_on:
            - mariadb
        volumes:
            - wordpress_data:/var/www/html
        secrets:
            - db-password
            - wp-admin-password
        env_file: .env
        networks:
            - inception
        restart: always

    nginx:
        container_name: nginx
        image: nginx
        hostname: ${HOST_NAME}
        build:
            context: requirements/nginx/
        depends_on:
            - wordpress
        volumes:
            - wordpress_data:/var/www/html
        ports:
            - 443:443
        networks:
            - inception
        restart: always
    redis:
        container_name: redis
        image: redis

secrets:
    db-password:
        file: secrets/db_password
    db-root-password:
        file: secrets/db_root_password
    wp-admin-password:
        file: secrets/wp_admin_password

networks:
    inception:
        driver: bridge

volumes:
    db_data:
        name: db_data
        driver: local
        driver_opts:
            type: "none"
            device: ${HOME}/data/db
            o: "bind"

    wordpress_data:
        name: wordpress_data
        driver: local
        driver_opts:
            type: "none"
            device: ${HOME}/data/wp
            o: "bind"
