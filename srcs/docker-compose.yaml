services:
  mariadb:
    container_name: mariadb
    build:
      context: requirements/mariadb/
    env_file: .env
    secrets:
      - db-password
      - db-root-password
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  wordpress:
    container_name: wordpress
    build:
      context: requirements/wordpress/
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db-password
      - wp-admin-password
    env_file: .env
    restart: always

  nginx:
    container_name: nginx
    build:
      context: requirements/nginx/
      context: requirements/nginx/
    depends_on:
      - wordpress
    volumes:
      - wordpress_data:/var/www/html
    ports:
      - 443:443
    restart: always

secrets:
  db-password:
    file: ../secrets/db_password
  db-root-password:
    file: ../secrets/db_root_password
  wp-admin-password:
    file: ../secrets/wp_admin_password
