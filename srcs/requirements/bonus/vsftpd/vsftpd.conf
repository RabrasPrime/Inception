listen=YES
listen_ipv6=NO
anonymous_enable=NO
local_enable=YES
write_enable=YES
use_localtime=YES
chroot_local_user=YES
allow_writeable_chroot=YES
local_root=/var/www/html
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
pasv_address=localhost
secure_chroot_dir=/var/run/vsftpd/empty
seccomp_sandbox=NO
background=NO
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
log_ftp_protocol=YES
